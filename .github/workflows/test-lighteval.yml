name: Test LightEval

on:
  push:
    branches: [main]
    paths: ['adapters/lighteval/**']
  pull_request:
    branches: [main]
    paths: ['adapters/lighteval/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install test dependencies
        working-directory: adapters/lighteval
        run: |
          SDK_DEP=$(grep 'eval-hub-sdk' requirements.txt)
          uv pip install --system "$SDK_DEP" -r requirements-test.txt
      - name: Run tests
        working-directory: adapters/lighteval
        run: pytest tests/ -v
