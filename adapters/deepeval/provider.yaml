# DeepEval — provider definition (same shape as eval-hub config/providers/*.yaml).
# Mount into eval-hub or sync via your operator's provider sync process.
#
# Discovery: eval-hub may surface `parameters` in UI. The adapter validates required
# inputs early in run_benchmark_job. Benchmark-specific metrics are defined below.

id: deepeval
name: DeepEval
description: LLM-as-judge evaluation framework with metrics for faithfulness, relevancy, hallucination, correctness, summarization, and multi-turn conversation evaluation
type: builtin

runtime:
  k8s:
    image: quay.io/evalhub/community-deepeval:latest
    image_pull_policy: Always
    entrypoint:
      - python
      - main.py
    cpu_request: 100m
    memory_request: 256Mi
    cpu_limit: 500m
    memory_limit: 1Gi
  local: null

benchmarks:
  - id: faithfulness
    name: Faithfulness
    description: >
      Tests if LLM output is faithful to the provided context. Measures whether
      claims in the output are supported by the retrieval context.
    category: rag-evaluation
    metrics:
      - faithfulness_score
      - claims_count
      - supported_claims_count
    tags:
      - deepeval
      - rag
      - faithfulness

  - id: relevancy
    name: Answer Relevancy
    description: >
      Tests if LLM output is relevant to the input query. Evaluates whether the
      generated answer addresses the user's question.
    category: rag-evaluation
    metrics:
      - relevancy_score
    tags:
      - deepeval
      - rag
      - relevancy

  - id: hallucination
    name: Hallucination
    description: >
      Tests for hallucinated content in LLM output. Detects statements that are
      not grounded in the provided context.
    category: safety
    metrics:
      - hallucination_score
      - hallucination_detected
    tags:
      - deepeval
      - safety
      - hallucination

  - id: correctness
    name: Correctness
    description: >
      Tests factual correctness of LLM answers against expected output.
      Compares generated answers to ground-truth references.
    category: accuracy
    metrics:
      - correctness_score
    tags:
      - deepeval
      - accuracy
      - correctness

  - id: summarization
    name: Summarization
    description: >
      Tests summarization quality of LLM output. Evaluates alignment with
      the source text and coverage of key information.
    category: nlp
    metrics:
      - summarization_score
    tags:
      - deepeval
      - nlp
      - summarization

  - id: conversation-completeness
    name: Conversation Completeness
    description: >
      Tests whether a chatbot adequately addresses all user needs across a multi-turn
      conversation. Evaluates task completion turn by turn using an LLM judge.
    category: multi-turn
    metrics:
      - conversation_completeness_score
    tags:
      - deepeval
      - multi-turn
      - completeness

  - id: role-adherence
    name: Role Adherence
    description: >
      Tests whether a chatbot adheres to its assigned persona or role throughout
      a multi-turn conversation. Requires chatbot_role in the dataset or parameters.
    category: multi-turn
    metrics:
      - role_adherence_score
    tags:
      - deepeval
      - multi-turn
      - role-adherence

  - id: knowledge-retention
    name: Knowledge Retention
    description: >
      Tests whether a chatbot retains and correctly uses information disclosed by
      the user in earlier turns of a conversation.
    category: multi-turn
    metrics:
      - knowledge_retention_score
    tags:
      - deepeval
      - multi-turn
      - knowledge-retention

parameters:
  - name: eval_model_name
    type: string
    default: null
    description: >
      Judge model name used by DeepEval for LLM-as-judge evaluation.
      Defaults to the evaluated model's name if not set.

  - name: eval_model_url
    type: string
    default: null
    description: >
      Base URL of the OpenAI-compatible judge endpoint (e.g. "http://judge-svc:8000/v1").
      Defaults to the evaluated model's URL if not set.

  - name: threshold
    type: float
    default: 0.5
    description: >
      Minimum pass threshold for metric scores. Test cases scoring below
      this value are marked as failed.

  - name: dataset_format
    type: string
    default: csv
    description: >
      Input dataset format. Supported values: csv, jsonl, json.
      For multi-turn benchmarks, jsonl or json are recommended so the turns
      field can be expressed as a native array.

  - name: chatbot_role
    type: string
    default: null
    description: >
      Chatbot persona description used by the Role Adherence benchmark
      (e.g. "helpful customer support agent"). Can also be provided per-record
      in the dataset as the chatbot_role column.

  - name: max_concurrent
    type: int
    default: 1
    description: >
      Maximum number of test cases evaluated concurrently. Lower values reduce
      burst load on the judge endpoint. Defaults to 1 (serial evaluation).

  - name: throttle_value
    type: float
    default: 0
    description: >
      Seconds to wait between test case evaluations. Use together with
      max_concurrent to pace requests to a rate-limited judge endpoint.

  - name: per_attempt_timeout_seconds
    type: float
    default: 300.0
    description: >
      Per-attempt timeout (seconds) for each LLM call made by the DeepEval judge.
      Overrides DEEPEVAL_PER_ATTEMPT_TIMEOUT_SECONDS_OVERRIDE. Setting this also
      causes DeepEval to auto-compute the outer per-task deadline as
      attempts × per_attempt_timeout + expected_backoff, giving retries enough
      headroom. The default of 300 s accommodates reasoning models (e.g. DeepSeek-R1,
      Phi-4) that emit long chain-of-thought sequences before the first response token.
      Reduce for fast non-reasoning judge models if tighter failure detection is needed.

  - name: retry_max_attempts
    type: int
    default: 2
    description: >
      Total number of attempts per LLM call (first attempt + retries).
      Increase when the judge endpoint is intermittently slow or rate-limited.
      Overrides DEEPEVAL_RETRY_MAX_ATTEMPTS.

  - name: retry_cap_seconds
    type: float
    default: 5.0
    description: >
      Maximum backoff sleep (seconds) between retry attempts.
      Increase to give a loaded judge endpoint more time to recover between retries.
      Overrides DEEPEVAL_RETRY_CAP_SECONDS.
